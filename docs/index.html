<style>
/* StageCloset theatrical dark UI */
:root {
  --stage: #16110f;
  --panel: #201814;
  --panel2: #2a1f1a;
  --line: #3d2e26;
  --curtain: #a3132e;
  --curtain-bright: #cf2445;
  --gold: #d4a545;
  --gold-dim: #9a7a35;
  --muslin: #ece2d0;
  --muslin-dim: #b3a68f;
  --ok: #4e9a51;
  --warn: #d98324;
  --bad: #d3455b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--stage);
  color: var(--muslin);
  font: 15px/1.5 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}
a { color: var(--gold); }

header.top {
  background: linear-gradient(180deg, #2b0d15 0%, #1d0a10 100%);
  border-bottom: 2px solid var(--curtain);
  padding: 14px 20px 10px;
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px 18px;
}
header.top h1 { font-size: 22px; letter-spacing: .5px; color: var(--muslin); font-weight: 700; }
header.top h1 .tick { color: var(--gold); }
header.top .tagline { color: var(--muslin-dim); font-size: 13px; }
header.top .pro-badge {
  margin-left: auto; font-size: 12px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--gold-dim); color: var(--gold); cursor: pointer; background: none;
}
header.top .pro-badge.active { background: var(--gold); color: #241a08; font-weight: 700; }

nav.tabs {
  display: flex; gap: 2px; padding: 0 14px; background: #1a1310;
  border-bottom: 1px solid var(--line); overflow-x: auto;
}
nav.tabs button {
  background: none; border: none; color: var(--muslin-dim); padding: 11px 16px;
  font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
}
nav.tabs button:hover { color: var(--muslin); }
nav.tabs button.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }
nav.tabs button .cnt { color: var(--muslin-dim); font-size: 12px; }

main { padding: 18px 20px 80px; max-width: 1200px; margin: 0 auto; }
.tabpane { display: none; }
.tabpane.active { display: block; }

h2 { font-size: 17px; color: var(--gold); margin: 4px 0 12px; }
h3 { font-size: 15px; color: var(--muslin); margin: 14px 0 8px; }

.panel {
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px 16px; margin-bottom: 14px;
}
.row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.grow { flex: 1 1 180px; }

input, select, textarea {
  background: #14100d; color: var(--muslin); border: 1px solid var(--line);
  border-radius: 6px; padding: 7px 9px; font: inherit; width: 100%;
}
input:focus, select:focus, textarea:focus { outline: 1px solid var(--gold-dim); }
label.f { display: block; font-size: 12px; color: var(--muslin-dim); margin-bottom: 2px; }
.field { flex: 1 1 140px; min-width: 120px; }
.field.small { flex: 0 1 90px; min-width: 80px; }

button.btn {
  background: var(--curtain); color: #fff; border: none; border-radius: 6px;
  padding: 8px 16px; font: inherit; font-weight: 600; cursor: pointer;
}
button.btn:hover { background: var(--curtain-bright); }
button.btn.gold { background: var(--gold); color: #241a08; }
button.btn.gold:hover { background: #e6bb5c; }
button.btn.ghost { background: none; border: 1px solid var(--line); color: var(--muslin-dim); font-weight: 400; }
button.btn.ghost:hover { color: var(--muslin); border-color: var(--gold-dim); }
button.btn.small { padding: 4px 10px; font-size: 13px; }
button.btn.danger { background: none; border: 1px solid var(--bad); color: var(--bad); }
button:disabled { opacity: .45; cursor: not-allowed; }

table.grid { width: 100%; border-collapse: collapse; font-size: 14px; }
table.grid th {
  text-align: left; color: var(--muslin-dim); font-size: 12px; text-transform: uppercase;
  letter-spacing: .4px; padding: 8px 8px; border-bottom: 1px solid var(--line);
}
table.grid td { padding: 8px 8px; border-bottom: 1px solid #2b211c; vertical-align: middle; }
table.grid tr:hover td { background: #241b16; }
table.grid td.num { text-align: right; font-variant-numeric: tabular-nums; }
.table-scroll { overflow-x: auto; }

.chip {
  display: inline-block; padding: 1px 8px; border-radius: 12px; font-size: 12px;
  border: 1px solid var(--line); color: var(--muslin-dim); white-space: nowrap;
}
.chip.in { border-color: var(--ok); color: var(--ok); }
.chip.out { border-color: var(--warn); color: var(--warn); }
.chip.overdue { border-color: var(--bad); color: var(--bad); font-weight: 600; }
.chip.repair { border-color: var(--warn); color: var(--warn); }
.chip.retired { opacity: .6; }
.chip.gold { border-color: var(--gold-dim); color: var(--gold); }

.thumb {
  width: 42px; height: 42px; border-radius: 6px; object-fit: cover;
  border: 1px solid var(--line); background: #0f0c0a; display: block;
}
.thumb.ph { display: flex; align-items: center; justify-content: center; color: #4d3d32; font-size: 18px; }

.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.tile { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
.tile .v { font-size: 24px; font-weight: 700; color: var(--muslin); font-variant-numeric: tabular-nums; }
.tile .v.gold { color: var(--gold); }
.tile .v.bad { color: var(--bad); }
.tile .k { font-size: 12px; color: var(--muslin-dim); margin-top: 2px; }

.notice { border-left: 3px solid var(--gold); background: var(--panel2); padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 14px; }
.notice.bad { border-left-color: var(--bad); }
.notice.warn { border-left-color: var(--warn); }

.muted { color: var(--muslin-dim); font-size: 13px; }
.right { margin-left: auto; }

/* modal */
.modal-back {
  position: fixed; inset: 0; background: rgba(8,5,4,.75); display: none;
  align-items: flex-start; justify-content: center; z-index: 50; padding: 30px 12px; overflow-y: auto;
}
.modal-back.open { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--gold-dim); border-radius: 12px;
  max-width: 640px; width: 100%; padding: 20px 22px; position: relative;
}
.modal h2 { margin-top: 0; }
.modal .x { position: absolute; top: 10px; right: 14px; background: none; border: none; color: var(--muslin-dim); font-size: 20px; cursor: pointer; }

.photo-strip { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.photo-strip img { width: 86px; height: 86px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
.photo-strip .del { position: absolute; top: 2px; right: 2px; }
.photo-wrap { position: relative; }
.photo-wrap button { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.7); color: var(--bad); border: none; border-radius: 4px; cursor: pointer; font-size: 12px; padding: 1px 6px; }

.bar { height: 10px; background: #2b211c; border-radius: 6px; overflow: hidden; }
.bar > i { display: block; height: 100%; background: var(--gold); }
.cat-row { display: flex; align-items: center; gap: 10px; margin: 4px 0; font-size: 13px; }
.cat-row .lbl { width: 130px; color: var(--muslin-dim); }
.cat-row .bar { flex: 1; }
.cat-row .n { width: 40px; text-align: right; font-variant-numeric: tabular-nums; }

.locked {
  border: 1px dashed var(--gold-dim); border-radius: 10px; padding: 16px; text-align: center;
  color: var(--muslin-dim); background: rgba(212,165,69,.04); margin: 10px 0;
}
.locked b { color: var(--gold); }

footer.foot {
  position: fixed; bottom: 0; left: 0; right: 0; background: #140f0c; border-top: 1px solid var(--line);
  padding: 7px 20px; font-size: 12px; color: var(--muslin-dim); display: flex; gap: 14px; flex-wrap: wrap; z-index: 10;
}
footer.foot .right { margin-left: auto; }

/* print pack */
.print-only { display: none; }
@media print {
  body { background: #fff; color: #000; font-size: 12px; }
  header.top, nav.tabs, footer.foot, .no-print, main { display: none !important; }
  .print-only { display: block; padding: 0; }
  .print-sheet h1 { font-size: 18px; margin-bottom: 2px; }
  .print-sheet .sub { color: #444; margin-bottom: 12px; font-size: 11px; }
  .print-sheet table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
  .print-sheet th, .print-sheet td { border: 1px solid #999; padding: 4px 6px; text-align: left; font-size: 11px; }
  .print-sheet th { background: #eee; }
  .print-sheet h3 { margin: 10px 0 4px; font-size: 13px; }
  .print-sheet .checkbox { width: 14px; height: 14px; border: 1.5px solid #333; display: inline-block; }
  .tag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
  .tag-cell {
    border: 1px dashed #888; padding: 10px 12px; height: 90px;
    display: flex; flex-direction: column; justify-content: center; page-break-inside: avoid;
  }
  .tag-cell .tid { font-size: 16px; font-weight: 700; font-family: monospace; }
  .tag-cell .tnm { font-size: 11px; }
  .tag-cell .tmeta { font-size: 9px; color: #555; }
}

@media (max-width: 640px) {
  main { padding: 12px 10px 90px; }
  header.top { padding: 10px 12px 8px; }
  .field { flex-basis: 100%; }
  .tiles { grid-template-columns: repeat(2, 1fr); }
}

</style>

<body>
<header class="top no-print">

<script>
(function(){
'use strict';
// ==== src/engine/items.js ====
// StageCloset engine: item catalog.
// Pure functions, no DOM, shared between browser and Node tests.

const CATEGORIES = [
  { id: 'dress', label: 'Dress', prefix: 'DR' },
  { id: 'jacket', label: 'Jacket / Suit', prefix: 'JK' },
  { id: 'shirt', label: 'Shirt / Blouse', prefix: 'SH' },
  { id: 'pants', label: 'Pants / Trousers', prefix: 'PT' },
  { id: 'skirt', label: 'Skirt', prefix: 'SK' },
  { id: 'shoes', label: 'Shoes / Boots', prefix: 'SO' },
  { id: 'hat', label: 'Hat / Headwear', prefix: 'HT' },
  { id: 'accessory', label: 'Accessory', prefix: 'AC' },
  { id: 'wig', label: 'Wig / Hair', prefix: 'WG' },
  { id: 'uniform', label: 'Uniform', prefix: 'UN' },
  { id: 'specialty', label: 'Specialty / Period', prefix: 'SP' },
  { id: 'prop', label: 'Prop', prefix: 'PR' },
  { id: 'set', label: 'Set Piece', prefix: 'ST' },
  { id: 'other', label: 'Other', prefix: 'OT' }
];

const CONDITIONS = ['new', 'good', 'fair', 'needs repair', 'retired'];

function categoryById(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
}

// --- Size normalization -------------------------------------------------
// Wardrobe sizes arrive as free text: "M", "medium", "10", "42R", "W32 L34",
// "6.5", "10-12 kids", "OSFA". We keep the raw string and derive a filter
// class so "find me a Large" works across notations.

const WORD_SIZES = {
  xxs: 'XXS', xs: 'XS', s: 'S', small: 'S', sm: 'S',
  m: 'M', med: 'M', medium: 'M',
  l: 'L', lg: 'L', large: 'L',
  xl: 'XL', xxl: 'XXL', '2xl': 'XXL', '3xl': 'XXXL', xxxl: 'XXXL',
  osfa: 'OSFA', 'one size': 'OSFA', onesize: 'OSFA', os: 'OSFA'
};

function normalizeSize(raw) {
  const s = String(raw || '').trim();
  if (!s) return { raw: '', cls: '', num: null };
  const lower = s.toLowerCase();
  if (WORD_SIZES[lower]) return { raw: s, cls: WORD_SIZES[lower], num: null };
  // Chest/jacket like "42R", "38L" (explicit length suffix)
  const jacket = lower.match(/^(\d{2})\s*(s|r|l|x)$/);
  if (jacket) {
    const n = parseInt(jacket[1], 10);
    return { raw: s, cls: numToClass(n, 'jacket'), num: n };
  }
  // Waist/inseam "W32 L34" or "32x34"
  const waist = lower.match(/^w?\s*(\d{2})\s*[x/lw]\s*l?\s*(\d{2})$/);
  if (waist) {
    const n = parseInt(waist[1], 10);
    return { raw: s, cls: numToClass(n, 'waist'), num: n };
  }
  // Kids ranges "10-12"
  const range = lower.match(/^(\d{1,2})\s*-\s*(\d{1,2})/);
  if (range) {
    const n = (parseInt(range[1], 10) + parseInt(range[2], 10)) / 2;
    return { raw: s, cls: numToClass(n, 'dress'), num: n };
  }
  // Plain numeric: 28-56 reads as a chest/jacket size, smaller as dress/shoe.
  const num = lower.match(/^(\d{1,2}(?:\.\d)?)$/);
  if (num) {
    const n = parseFloat(num[1]);
    const kind = n >= 28 ? 'jacket' : 'dress';
    return { raw: s, cls: numToClass(n, kind), num: n };
  }
  // Word size buried in text: "size medium", "ladies L"
  for (const key of Object.keys(WORD_SIZES)) {
    const re = new RegExp('(^|\\s)' + key.replace(/\s/g, '\\s') + '($|\\s)');
    if (re.test(lower)) return { raw: s, cls: WORD_SIZES[key], num: null };
  }
  return { raw: s, cls: '', num: null };
}

function numToClass(n, kind) {
  if (kind === 'jacket') {
    if (n <= 34) return 'XS';
    if (n <= 37) return 'S';
    if (n <= 41) return 'M';
    if (n <= 45) return 'L';
    if (n <= 49) return 'XL';
    return 'XXL';
  }
  if (kind === 'waist') {
    if (n <= 28) return 'XS';
    if (n <= 32) return 'S';
    if (n <= 36) return 'M';
    if (n <= 40) return 'L';
    if (n <= 44) return 'XL';
    return 'XXL';
  }
  // dress-size-ish numbers (also covers shoe sizes well enough for filtering)
  if (n <= 2) return 'XS';
  if (n < 8) return 'S';
  if (n <= 10) return 'M';
  if (n <= 14) return 'L';
  if (n <= 18) return 'XL';
  return 'XXL';
}

// --- State + CRUD -------------------------------------------------------

function emptyState() {
  return {
    items: [],
    checkouts: [],
    productions: [],
    assignments: [],
    counters: {},       // category prefix -> last sequence number
    createdAt: new Date().toISOString()
  };
}

let idSeq = 0;
function freshId(prefix) {
  idSeq += 1;
  return prefix + '_' + Date.now().toString(36) + '_' + idSeq.toString(36);
}

function nextTagId(state, categoryId) {
  const cat = categoryById(categoryId);
  const n = (state.counters[cat.prefix] || 0) + 1;
  return cat.prefix + '-' + String(n).padStart(4, '0');
}

function addItem(state, data) {
  const errors = [];
  const name = String(data.name || '').trim();
  if (!name) errors.push('Name is required.');
  const category = categoryById(data.category).id;
  let tagId = String(data.tagId || '').trim();
  if (tagId && state.items.some(i => i.tagId === tagId)) {
    errors.push('Tag ID "' + tagId + '" is already in use.');
  }
  if (errors.length) return { ok: false, errors };
  if (!tagId) {
    tagId = nextTagId(state, category);
    const prefix = categoryById(category).prefix;
    state.counters[prefix] = (state.counters[prefix] || 0) + 1;
  }
  const size = normalizeSize(data.size);
  const item = {
    id: freshId('it'),
    tagId,
    name,
    category,
    era: String(data.era || '').trim(),
    size,
    colors: parseColors(data.colors),
    gender: data.gender || '',
    condition: CONDITIONS.includes(data.condition) ? data.condition : 'good',
    location: {
      room: String((data.location && data.location.room) || data.room || '').trim(),
      rack: String((data.location && data.location.rack) || data.rack || '').trim(),
      bin: String((data.location && data.location.bin) || data.bin || '').trim()
    },
    valueCents: toCents(data.value),
    notes: String(data.notes || '').trim(),
    photoIds: Array.isArray(data.photoIds) ? data.photoIds.slice() : [],
    retired: false,
    createdAt: data.createdAt || new Date().toISOString()
  };
  state.items.push(item);
  return { ok: true, item };
}

function updateItem(state, itemId, patch) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return { ok: false, errors: ['Item not found.'] };
  if (patch.tagId !== undefined) {
    const t = String(patch.tagId).trim();
    if (t && state.items.some(i => i.tagId === t && i.id !== itemId)) {
      return { ok: false, errors: ['Tag ID "' + t + '" is already in use.'] };
    }
    item.tagId = t || item.tagId;
  }
  if (patch.name !== undefined) {
    const n = String(patch.name).trim();
    if (!n) return { ok: false, errors: ['Name is required.'] };
    item.name = n;
  }
  if (patch.category !== undefined) item.category = categoryById(patch.category).id;
  if (patch.era !== undefined) item.era = String(patch.era).trim();
  if (patch.size !== undefined) item.size = normalizeSize(patch.size);
  if (patch.colors !== undefined) item.colors = parseColors(patch.colors);
  if (patch.gender !== undefined) item.gender = patch.gender;
  if (patch.condition !== undefined && CONDITIONS.includes(patch.condition)) item.condition = patch.condition;
  if (patch.room !== undefined) item.location.room = String(patch.room).trim();
  if (patch.rack !== undefined) item.location.rack = String(patch.rack).trim();
  if (patch.bin !== undefined) item.location.bin = String(patch.bin).trim();
  if (patch.value !== undefined) item.valueCents = toCents(patch.value);
  if (patch.notes !== undefined) item.notes = String(patch.notes).trim();
  if (patch.photoIds !== undefined) item.photoIds = patch.photoIds.slice();
  if (patch.retired !== undefined) item.retired = !!patch.retired;
  return { ok: true, item };
}

function removeItem(state, itemId) {
  const idx = state.items.findIndex(i => i.id === itemId);
  if (idx === -1) return { ok: false, errors: ['Item not found.'] };
  const open = state.checkouts.some(c => c.itemId === itemId && !c.returnedAt);
  if (open) return { ok: false, errors: ['Item is checked out. Check it in before deleting.'] };
  state.items.splice(idx, 1);
  state.assignments = state.assignments.filter(a => a.itemId !== itemId);
  return { ok: true };
}

function parseColors(input) {
  if (Array.isArray(input)) return input.map(c => String(c).trim().toLowerCase()).filter(Boolean);
  return String(input || '')
    .split(/[,/;+&]/)
    .map(c => c.trim().toLowerCase())
    .filter(Boolean);
}

function toCents(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return Math.max(0, Math.round(v * 100));
  const cleaned = String(v).replace(/[^0-9.]/g, '');
  if (!cleaned) return 0;
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : Math.max(0, Math.round(n * 100));
}

function fmtMoney(cents) {
  const sign = cents < 0 ? '-' : '';
  const abs = Math.abs(cents);
  return sign + '$' + (abs / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function locationLabel(item) {
  return [item.location.room, item.location.rack, item.location.bin].filter(Boolean).join(' / ');
}

// ==== src/engine/checkout.js ====
// StageCloset engine: check-out / check-in ledger.
// A checkout is open until returnedAt is set. One open checkout per item.


function checkOut(state, itemId, opts) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return { ok: false, errors: ['Item not found.'] };
  if (item.retired) return { ok: false, errors: ['"' + item.name + '" is retired and cannot be checked out.'] };
  if (openCheckoutFor(state, itemId)) {
    return { ok: false, errors: ['"' + item.name + '" is already checked out.'] };
  }
  const borrower = String((opts && opts.borrower) || '').trim();
  if (!borrower) return { ok: false, errors: ['Borrower name is required.'] };
  const rec = {
    id: freshId('co'),
    itemId,
    borrower,
    contact: String((opts && opts.contact) || '').trim(),
    productionId: (opts && opts.productionId) || null,
    note: String((opts && opts.note) || '').trim(),
    checkedOutAt: (opts && opts.date) || todayISO(),
    dueDate: (opts && opts.dueDate) || '',
    returnedAt: null,
    returnCondition: '',
    returnNote: ''
  };
  state.checkouts.push(rec);
  return { ok: true, checkout: rec };
}

function checkIn(state, itemId, opts) {
  const rec = openCheckoutFor(state, itemId);
  if (!rec) return { ok: false, errors: ['Item has no open checkout.'] };
  rec.returnedAt = (opts && opts.date) || todayISO();
  rec.returnCondition = String((opts && opts.condition) || '').trim();
  rec.returnNote = String((opts && opts.note) || '').trim();
  if (opts && opts.condition) {
    const item = state.items.find(i => i.id === itemId);
    if (item && ['new', 'good', 'fair', 'needs repair'].includes(opts.condition)) {
      item.condition = opts.condition;
    }
  }
  return { ok: true, checkout: rec };
}

function openCheckoutFor(state, itemId) {
  return state.checkouts.find(c => c.itemId === itemId && !c.returnedAt) || null;
}

function openCheckouts(state) {
  return state.checkouts.filter(c => !c.returnedAt);
}

function historyFor(state, itemId) {
  return state.checkouts
    .filter(c => c.itemId === itemId)
    .sort((a, b) => (a.checkedOutAt < b.checkedOutAt ? 1 : -1));
}

// Days late as of a given date. dueDate empty => never overdue.
function daysLate(rec, asOf) {
  if (!rec.dueDate || rec.returnedAt) return 0;
  const due = parseISO(rec.dueDate);
  const now = parseISO(asOf || todayISO());
  const diff = Math.floor((now - due) / 86400000);
  return diff > 0 ? diff : 0;
}

function overdue(state, asOf) {
  return openCheckouts(state)
    .map(c => ({ checkout: c, daysLate: daysLate(c, asOf) }))
    .filter(x => x.daysLate > 0)
    .sort((a, b) => b.daysLate - a.daysLate);
}

// Rollup: who has what, worth how much.
function borrowerRollup(state) {
  const map = new Map();
  for (const c of openCheckouts(state)) {
    const key = c.borrower.toLowerCase();
    if (!map.has(key)) map.set(key, { borrower: c.borrower, items: [], valueCents: 0 });
    const entry = map.get(key);
    const item = state.items.find(i => i.id === c.itemId);
    entry.items.push({ checkout: c, item });
    entry.valueCents += item ? item.valueCents : 0;
  }
  return Array.from(map.values()).sort((a, b) => b.valueCents - a.valueCents);
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function parseISO(s) {
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return new Date(NaN);
  return new Date(Date.UTC(+m[1], +m[2] - 1, +m[3]));
}

// ==== src/engine/productions.js ====
// StageCloset engine: productions, pull lists, and post-show reconciliation.



const ASSIGNMENT_STATUSES = ['planned', 'pulled', 'fitted', 'returned'];

function addProduction(state, data) {
  const name = String((data && data.name) || '').trim();
  if (!name) return { ok: false, errors: ['Production name is required.'] };
  const prod = {
    id: freshId('pr'),
    name,
    opens: (data && data.opens) || '',
    closes: (data && data.closes) || '',
    status: 'planning', // planning | running | closed
    notes: String((data && data.notes) || '').trim(),
    createdAt: new Date().toISOString()
  };
  state.productions.push(prod);
  return { ok: true, production: prod };
}

function setProductionStatus(state, productionId, status) {
  const prod = state.productions.find(p => p.id === productionId);
  if (!prod) return { ok: false, errors: ['Production not found.'] };
  if (!['planning', 'running', 'closed'].includes(status)) {
    return { ok: false, errors: ['Unknown status.'] };
  }
  prod.status = status;
  return { ok: true, production: prod };
}

function assignItem(state, productionId, itemId, data) {
  const prod = state.productions.find(p => p.id === productionId);
  if (!prod) return { ok: false, errors: ['Production not found.'] };
  const item = state.items.find(i => i.id === itemId);
  if (!item) return { ok: false, errors: ['Item not found.'] };
  if (item.retired) return { ok: false, errors: ['"' + item.name + '" is retired.'] };
  const dup = state.assignments.find(a => a.productionId === productionId && a.itemId === itemId);
  if (dup) return { ok: false, errors: ['"' + item.name + '" is already on this pull list.'] };
  const a = {
    id: freshId('as'),
    productionId,
    itemId,
    character: String((data && data.character) || '').trim(),
    actor: String((data && data.actor) || '').trim(),
    scene: String((data && data.scene) || '').trim(),
    status: 'planned',
    addedAt: new Date().toISOString()
  };
  state.assignments.push(a);
  return { ok: true, assignment: a };
}

function setAssignmentStatus(state, assignmentId, status) {
  const a = state.assignments.find(x => x.id === assignmentId);
  if (!a) return { ok: false, errors: ['Assignment not found.'] };
  if (!ASSIGNMENT_STATUSES.includes(status)) return { ok: false, errors: ['Unknown status.'] };
  a.status = status;
  return { ok: true, assignment: a };
}

function unassignItem(state, assignmentId) {
  const idx = state.assignments.findIndex(a => a.id === assignmentId);
  if (idx === -1) return { ok: false, errors: ['Assignment not found.'] };
  state.assignments.splice(idx, 1);
  return { ok: true };
}

function assignmentsFor(state, productionId) {
  return state.assignments.filter(a => a.productionId === productionId);
}

// Pull sheet grouped by physical location so a volunteer walks the storage
// room once, in order, instead of zig-zagging per character.
function pullSheet(state, productionId) {
  const rows = assignmentsFor(state, productionId).map(a => {
    const item = state.items.find(i => i.id === a.itemId);
    return { assignment: a, item, location: item ? locationLabel(item) : '' };
  });
  const groups = new Map();
  for (const r of rows) {
    const key = r.location || '(no location)';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  }
  const grouped = Array.from(groups.entries())
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([location, list]) => ({
      location,
      rows: list.sort((a, b) => (a.item && b.item ? a.item.tagId.localeCompare(b.item.tagId) : 0))
    }));
  return { groups: grouped, total: rows.length };
}

// Costume plot: per character, what they wear, in scene order.
function costumePlot(state, productionId) {
  const rows = assignmentsFor(state, productionId);
  const byChar = new Map();
  for (const a of rows) {
    const key = a.character || '(unassigned)';
    if (!byChar.has(key)) byChar.set(key, { character: key, actor: a.actor, pieces: [] });
    const entry = byChar.get(key);
    if (!entry.actor && a.actor) entry.actor = a.actor;
    const item = state.items.find(i => i.id === a.itemId);
    entry.pieces.push({ assignment: a, item });
  }
  for (const entry of byChar.values()) {
    entry.pieces.sort((a, b) => sceneSort(a.assignment.scene, b.assignment.scene));
  }
  return Array.from(byChar.values()).sort((a, b) => a.character.localeCompare(b.character));
}

function sceneSort(a, b) {
  const na = parseFloat(String(a).replace(/[^0-9.]/g, ''));
  const nb = parseFloat(String(b).replace(/[^0-9.]/g, ''));
  if (!isNaN(na) && !isNaN(nb)) return na - nb;
  return String(a).localeCompare(String(b));
}

// After closing: anything assigned that never came back, with dollar value.
// "Returned" means assignment marked returned OR item has no open checkout
// tied to this production.
function reconcile(state, productionId) {
  const missing = [];
  let missingValueCents = 0;
  for (const a of assignmentsFor(state, productionId)) {
    if (a.status === 'returned') continue;
    const item = state.items.find(i => i.id === a.itemId);
    if (!item) continue;
    const open = openCheckoutFor(state, item.id);
    const stillOut = open && open.productionId === productionId;
    // An item is "unreconciled" if its assignment was never marked returned.
    // It is *urgently* missing if it is also still checked out.
    missing.push({
      assignment: a,
      item,
      stillCheckedOut: !!stillOut,
      borrower: stillOut ? open.borrower : ''
    });
    missingValueCents += item.valueCents;
  }
  missing.sort((a, b) => b.item.valueCents - a.item.valueCents);
  return { missing, missingValueCents, assignedCount: assignmentsFor(state, productionId).length };
}

// Items assigned to two productions with overlapping date ranges.
function conflicts(state) {
  const out = [];
  const byItem = new Map();
  for (const a of state.assignments) {
    if (!byItem.has(a.itemId)) byItem.set(a.itemId, []);
    byItem.get(a.itemId).push(a);
  }
  for (const [itemId, list] of byItem.entries()) {
    if (list.length < 2) continue;
    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const p1 = state.productions.find(p => p.id === list[i].productionId);
        const p2 = state.productions.find(p => p.id === list[j].productionId);
        if (!p1 || !p2 || p1.status === 'closed' || p2.status === 'closed') continue;
        if (rangesOverlap(p1.opens, p1.closes, p2.opens, p2.closes)) {
          const item = state.items.find(it => it.id === itemId);
          out.push({ item, productions: [p1, p2] });
        }
      }
    }
  }
  return out;
}

function rangesOverlap(aOpen, aClose, bOpen, bClose) {
  // Missing dates are treated as open-ended: overlap is assumed.
  if (!aOpen || !bOpen) return true;
  const a1 = parseISO(aOpen), a2 = aClose ? parseISO(aClose) : parseISO(aOpen);
  const b1 = parseISO(bOpen), b2 = bClose ? parseISO(bClose) : parseISO(bOpen);
  return a1 <= b2 && b1 <= a2;
}

// ==== src/engine/search.js ====
// StageCloset engine: search + structured filters over the catalog.



// filters: { q, category, sizeClass, gender, condition, status, era, location }
// status: '' | 'in' | 'out' | 'repair' | 'retired'
function searchItems(state, filters) {
  const f = filters || {};
  const tokens = tokenize(f.q);
  return state.items.filter(item => {
    if (f.category && item.category !== f.category) return false;
    if (f.sizeClass && item.size.cls !== f.sizeClass) return false;
    if (f.gender && item.gender !== f.gender) return false;
    if (f.condition && item.condition !== f.condition) return false;
    if (f.era && !item.era.toLowerCase().includes(String(f.era).toLowerCase())) return false;
    if (f.location) {
      const loc = locationLabel(item).toLowerCase();
      if (!loc.includes(String(f.location).toLowerCase())) return false;
    }
    if (f.status) {
      const out = !!openCheckoutFor(state, item.id);
      if (f.status === 'in' && (out || item.retired)) return false;
      if (f.status === 'out' && !out) return false;
      if (f.status === 'repair' && item.condition !== 'needs repair') return false;
      if (f.status === 'retired' && !item.retired) return false;
    } else if (item.retired) {
      // Retired items stay out of default views unless asked for.
      return false;
    }
    if (tokens.length) {
      const hay = haystack(item);
      for (const t of tokens) {
        if (!hay.includes(t)) return false;
      }
    }
    return true;
  });
}

function tokenize(q) {
  return String(q || '')
    .toLowerCase()
    .split(/\s+/)
    .map(t => t.trim())
    .filter(t => t.length > 0);
}

function haystack(item) {
  return [
    item.name,
    item.tagId,
    item.category,
    item.era,
    item.size.raw,
    item.size.cls,
    item.colors.join(' '),
    item.gender,
    item.notes,
    locationLabel(item)
  ].join(' ').toLowerCase();
}

// ==== src/engine/stats.js ====
// StageCloset engine: dashboard stats.


function dashboard(state, asOf) {
  const active = state.items.filter(i => !i.retired);
  const totalValueCents = active.reduce((s, i) => s + i.valueCents, 0);

  const open = openCheckouts(state);
  let outValueCents = 0;
  for (const c of open) {
    const item = state.items.find(i => i.id === c.itemId);
    if (item) outValueCents += item.valueCents;
  }

  const byCategory = {};
  for (const i of active) {
    byCategory[i.category] = (byCategory[i.category] || 0) + 1;
  }

  const byCondition = {};
  for (const i of active) {
    byCondition[i.condition] = (byCondition[i.condition] || 0) + 1;
  }

  const repairList = active.filter(i => i.condition === 'needs repair');

  return {
    itemCount: active.length,
    retiredCount: state.items.length - active.length,
    totalValueCents,
    outCount: open.length,
    outValueCents,
    overdueList: overdue(state, asOf),
    byCategory,
    byCondition,
    repairList,
    productionCount: state.productions.filter(p => p.status !== 'closed').length
  };
}

// ==== src/engine/csvio.js ====
// StageCloset engine: CSV import (with column auto-mapping) and export.
// The import path is the migration story: every costume closet already has
// a spreadsheet. Paste or drop it in, get a tagged catalog.


// --- CSV parser (quotes, embedded commas/newlines, CRLF) ----------------
function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  const s = String(text || '');
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuotes) {
      if (ch === '"') {
        if (s[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else if (ch === '"') {
      inQuotes = true;
    } else if (ch === ',') {
      row.push(field); field = '';
    } else if (ch === '\n' || ch === '\r') {
      if (ch === '\r' && s[i + 1] === '\n') i++;
      row.push(field); field = '';
      if (row.length > 1 || row[0] !== '') rows.push(row);
      row = [];
    } else field += ch;
  }
  if (field !== '' || row.length) {
    row.push(field);
    if (row.length > 1 || row[0] !== '') rows.push(row);
  }
  return rows;
}

// --- Column auto-mapper --------------------------------------------------
const COLUMN_SYNONYMS = {
  name: ['name', 'item', 'item name', 'description', 'piece', 'costume', 'title', 'garment'],
  tagId: ['tag', 'tag id', 'tagid', 'id', 'barcode', 'code', 'item #', 'item no', 'number', 'inventory #'],
  category: ['category', 'type', 'kind', 'dept', 'department', 'class'],
  size: ['size', 'sz', 'measurements'],
  colors: ['color', 'colors', 'colour', 'colours'],
  era: ['era', 'period', 'decade', 'style', 'time period'],
  gender: ['gender', 'sex', 'm/f', 'mens/womens'],
  condition: ['condition', 'state', 'quality'],
  room: ['room', 'storage', 'closet', 'area', 'building'],
  rack: ['rack', 'shelf', 'section', 'row'],
  bin: ['bin', 'box', 'container', 'drawer', 'tub'],
  value: ['value', 'price', 'cost', 'replacement', 'replacement value', 'replacement cost', 'worth', '$'],
  notes: ['notes', 'note', 'comments', 'comment', 'remarks', 'details']
};

function autoMapColumns(headerRow) {
  const mapping = {}; // field -> column index
  const used = new Set();
  const headers = headerRow.map(h => String(h).trim().toLowerCase());
  for (const [field, synonyms] of Object.entries(COLUMN_SYNONYMS)) {
    for (let idx = 0; idx < headers.length; idx++) {
      if (used.has(idx)) continue;
      if (synonyms.includes(headers[idx])) {
        mapping[field] = idx;
        used.add(idx);
        break;
      }
    }
  }
  // Fuzzy pass: header *contains* a synonym (e.g. "Item Description").
  for (const [field, synonyms] of Object.entries(COLUMN_SYNONYMS)) {
    if (mapping[field] !== undefined) continue;
    for (let idx = 0; idx < headers.length; idx++) {
      if (used.has(idx)) continue;
      if (synonyms.some(syn => syn.length > 2 && headers[idx].includes(syn))) {
        mapping[field] = idx;
        used.add(idx);
        break;
      }
    }
  }
  return mapping;
}

// Best-effort category guess from free text like "Victorian dress" or "Props".
function guessCategory(text) {
  const t = String(text || '').toLowerCase();
  const table = [
    ['dress', ['dress', 'gown', 'frock']],
    ['jacket', ['jacket', 'suit', 'coat', 'blazer', 'vest', 'waistcoat', 'tux']],
    ['shirt', ['shirt', 'blouse', 'top', 'tee', 'sweater']],
    ['pants', ['pant', 'trouser', 'slack', 'jean', 'short', 'breech']],
    ['skirt', ['skirt', 'petticoat', 'tutu']],
    ['shoes', ['shoe', 'boot', 'heel', 'sneaker', 'slipper', 'sandal']],
    ['hat', ['hat', 'cap', 'bonnet', 'helmet', 'crown', 'headband', 'fascinator']],
    ['wig', ['wig', 'hairpiece', 'beard', 'mustache', 'moustache']],
    ['uniform', ['uniform', 'military', 'police', 'nurse', 'scrubs', 'soldier']],
    ['accessory', ['accessor', 'glove', 'scarf', 'belt', 'tie', 'jewel', 'necklace', 'purse', 'bag', 'glasses', 'mask', 'sash', 'suspender', 'apron', 'shawl', 'cape']],
    ['prop', ['prop', 'sword', 'cane', 'umbrella', 'basket', 'lantern', 'book', 'telephone', 'suitcase', 'wand', 'watch', 'clock', 'pipe', 'tray', 'bottle', 'letter']],
    ['set', ['set piece', 'furniture', 'chair', 'table', 'bench', 'backdrop', 'flat']]
  ];
  for (const [id, words] of table) {
    if (words.some(w => t.includes(w))) return id;
  }
  return 'other';
}

// Import rows into state. Returns {ok, imported, skipped, errors[]}
function importRows(state, rows, mappingArg) {
  if (!rows.length) return { ok: false, imported: 0, skipped: 0, errors: ['No rows found.'] };
  const mapping = mappingArg || autoMapColumns(rows[0]);
  if (mapping.name === undefined) {
    return { ok: false, imported: 0, skipped: 0, errors: ['Could not find a name/item column in the header row.'] };
  }
  let imported = 0, skipped = 0;
  const errors = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const get = f => (mapping[f] !== undefined ? String(row[mapping[f]] || '').trim() : '');
    const name = get('name');
    if (!name) { skipped++; continue; }
    const catText = get('category') || name;
    const res = addItem(state, {
      name,
      tagId: get('tagId'),
      category: normalizeCategoryText(get('category')) || guessCategory(catText),
      size: get('size'),
      colors: get('colors'),
      era: get('era'),
      gender: normalizeGender(get('gender')),
      condition: normalizeCondition(get('condition')),
      room: get('room'),
      rack: get('rack'),
      bin: get('bin'),
      value: get('value'),
      notes: get('notes')
    });
    if (res.ok) imported++;
    else {
      skipped++;
      if (errors.length < 10) errors.push('Row ' + (r + 1) + ': ' + res.errors.join(' '));
    }
  }
  return { ok: true, imported, skipped, errors, mapping };
}

function normalizeCategoryText(text) {
  const t = String(text || '').trim().toLowerCase();
  if (!t) return '';
  const exact = CATEGORIES.find(c => c.id === t || c.label.toLowerCase() === t);
  if (exact) return exact.id;
  return guessCategory(t);
}

function normalizeGender(text) {
  const t = String(text || '').trim().toLowerCase();
  if (['m', 'male', 'men', 'mens', "men's", 'man'].includes(t)) return 'M';
  if (['f', 'female', 'women', 'womens', "women's", 'woman', 'ladies'].includes(t)) return 'F';
  if (['u', 'unisex', 'any', 'either', 'n/a'].includes(t)) return 'U';
  return '';
}

function normalizeCondition(text) {
  const t = String(text || '').trim().toLowerCase();
  if (['new', 'excellent', 'like new', 'mint'].includes(t)) return 'new';
  if (['good', 'ok', 'okay', 'fine'].includes(t)) return 'good';
  if (['fair', 'worn', 'used'].includes(t)) return 'fair';
  if (t.includes('repair') || t.includes('damage') || t.includes('torn') || t.includes('broken') || ['poor', 'bad'].includes(t)) return 'needs repair';
  return 'good';
}

// --- Export ---------------------------------------------------------------
function exportCSV(state) {
  const header = ['Tag ID', 'Name', 'Category', 'Size', 'Colors', 'Era', 'Gender', 'Condition', 'Room', 'Rack', 'Bin', 'Value', 'Notes', 'Status'];
  const lines = [header.map(csvEscape).join(',')];
  for (const i of state.items) {
    const open = state.checkouts.find(c => c.itemId === i.id && !c.returnedAt);
    lines.push([
      i.tagId, i.name, i.category, i.size.raw, i.colors.join('; '), i.era, i.gender,
      i.condition, i.location.room, i.location.rack, i.location.bin,
      (i.valueCents / 100).toFixed(2), i.notes,
      i.retired ? 'retired' : (open ? 'OUT: ' + open.borrower : 'in')
    ].map(csvEscape).join(','));
  }
  return lines.join('\r\n');
}

function csvEscape(v) {
  const s = String(v === null || v === undefined ? '' : v);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

// ==== src/engine/license.js ====
// StageCloset offline Pro licenses.
// Format: STAGECLOSET-XXXX-XXXX-XXXX (Crockford base32 blocks).
// Third block is an FNV-1a checksum of the first two, so any minted key
// validates offline with no server and no seed list.
// GOTCHA: the prefix itself contains S/T/A/G/E/C/L/O — L and O normalize to
// 1 and 0 under typo tolerance, so ALWAYS compare normalized-to-normalized.

const ALPHABET = '0123456789ABCDEFGHJKMNPQRSTVWXYZ'; // Crockford base32
const PREFIX = 'STAGECLOSET';

function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h >>> 0;
}

function toBase32(n, len) {
  let out = '';
  for (let i = 0; i < len; i++) {
    out = ALPHABET[n % 32] + out;
    n = Math.floor(n / 32);
  }
  return out;
}

// Normalize common typos: O->0, I->1, L->1, lowercase -> uppercase.
function normalizeKey(raw) {
  return String(raw || '')
    .toUpperCase()
    .replace(/O/g, '0')
    .replace(/[IL]/g, '1')
    .replace(/[^0-9A-Z]/g, '');
}

const NORM_PREFIX = normalizeKey(PREFIX);

function checksumBlock(b1, b2) {
  return toBase32(fnv1a(NORM_PREFIX + '|' + b1 + '|' + b2), 4);
}

function mintKey(seed) {
  const h1 = fnv1a('stagecloset-a|' + seed);
  const h2 = fnv1a('stagecloset-b|' + seed);
  const b1 = toBase32(h1, 4);
  const b2 = toBase32(h2, 4);
  const b3 = checksumBlock(b1, b2);
  return PREFIX + '-' + b1 + '-' + b2 + '-' + b3;
}

function validateKey(raw) {
  const norm = normalizeKey(raw);
  if (!norm.startsWith(NORM_PREFIX)) return false;
  const rest = norm.slice(NORM_PREFIX.length);
  if (rest.length !== 12) return false;
  const b1 = rest.slice(0, 4);
  const b2 = rest.slice(4, 8);
  const b3 = rest.slice(8, 12);
  if (![b1, b2, b3].every(b => [...b].every(ch => ALPHABET.includes(ch)))) return false;
  return checksumBlock(b1, b2) === b3;
}

// ==== src/engine/vault.js ====
// StageCloset vault: whole-closet backup and restore.
// This is the volunteer-turnover answer: outgoing wardrobe manager exports
// one .stagecloset file, incoming manager imports it. Nothing is lost in
// the handover, no account required.

const VAULT_FORMAT = 'stagecloset-vault';
const VAULT_VERSION = 1;

function serializeVault(state, opts) {
  const includePhotos = !!(opts && opts.photos);
  return JSON.stringify({
    format: VAULT_FORMAT,
    version: VAULT_VERSION,
    exportedAt: new Date().toISOString(),
    data: {
      items: state.items,
      checkouts: state.checkouts,
      productions: state.productions,
      assignments: state.assignments,
      counters: state.counters,
      createdAt: state.createdAt
    },
    photos: includePhotos ? (opts.photos === true ? {} : opts.photos) : undefined
  });
}

function parseVault(text) {
  let obj;
  try {
    obj = JSON.parse(text);
  } catch (e) {
    return { ok: false, errors: ['Not a valid vault file (JSON parse failed).'] };
  }
  if (!obj || obj.format !== VAULT_FORMAT) {
    return { ok: false, errors: ['Not a StageCloset vault file.'] };
  }
  if (typeof obj.version !== 'number' || obj.version > VAULT_VERSION) {
    return { ok: false, errors: ['This vault was made by a newer version of StageCloset. Update the app first.'] };
  }
  const d = obj.data || {};
  const state = {
    items: Array.isArray(d.items) ? d.items : [],
    checkouts: Array.isArray(d.checkouts) ? d.checkouts : [],
    productions: Array.isArray(d.productions) ? d.productions : [],
    assignments: Array.isArray(d.assignments) ? d.assignments : [],
    counters: d.counters && typeof d.counters === 'object' ? d.counters : {},
    createdAt: d.createdAt || new Date().toISOString()
  };
  // Integrity: drop checkouts/assignments pointing at items that don't exist.
  const ids = new Set(state.items.map(i => i.id));
  state.checkouts = state.checkouts.filter(c => ids.has(c.itemId));
  state.assignments = state.assignments.filter(a => ids.has(a.itemId));
  return { ok: true, state, photos: obj.photos || {}, exportedAt: obj.exportedAt };
}

// ---------- persistence ----------
function loadState() {
  try {
    var raw = localStorage.getItem(LS_STATE);
    if (raw) {
      var v = parseVault(raw);
      if (v.ok) return v.state;
      var plain = JSON.parse(raw);
      if (plain && Array.isArray(plain.items)) return plain;
    }
  } catch (e) { /* fall through to fresh state */ }
  return emptyState();
}
function save() {
  localStorage.setItem(LS_STATE, serializeVault(state));
  renderAll();
}

// ---------- IndexedDB photos ----------
var dbPromise = null;
function db() {
  if (!dbPromise) {
    dbPromise = new Promise(function (res, rej) {
      var req = indexedDB.open('stagecloset-photos', 1);
      req.onupgradeneeded = function () { req.result.createObjectStore('photos'); };
      req.onsuccess = function () { res(req.result); };
      req.onerror = function () { rej(req.error); };
    });
  }
  return dbPromise;
}
function photoPut(id, blob) {
  return db().then(function (d) {
    return new Promise(function (res, rej) {
      var tx = d.transaction('photos', 'readwrite');
      tx.objectStore('photos').put(blob, id);
      tx.oncomplete = res; tx.onerror = function () { rej(tx.error); };
    });
  });
}
function photoGet(id) {
  return db().then(function (d) {
    return new Promise(function (res) {
      var req = d.transaction('photos').objectStore('photos').get(id);
      req.onsuccess = function () { res(req.result || null); };
      req.onerror = function () { res(null); };
    });
  });
}
function photoDel(id) {
  return db().then(function (d) {
    return new Promise(function (res) {
      var tx = d.transaction('photos', 'readwrite');
      tx.objectStore('photos').delete(id);
      tx.oncomplete = res; tx.onerror = res;
    });
  });
}
function photoURL(id) {
  if (urlCache.has(id)) return Promise.resolve(urlCache.get(id));
  return photoGet(id).then(function (blob) {
    if (!blob) return null;
    var u = URL.createObjectURL(blob);
    urlCache.set(id, u);
    return u;
  });
}
function downscale(file) {
  return new Promise(function (res, rej) {
    var img = new Image();
    var fr = new FileReader();
    fr.onload = function () { img.src = fr.result; };
    fr.onerror = rej;
    img.onload = function () {
      var max = 700;
      var scale = Math.min(1, max / Math.max(img.width, img.height));
      var c = document.createElement('canvas');
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(function (b) { b ? res(b) : rej(new Error('encode failed')); }, 'image/jpeg', 0.82);
    };
    img.onerror = rej;
    fr.readAsDataURL(file);
  });
}

}

function download(filename, text, mime) {
  var blob = new Blob([text], { type: mime || 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;

    '<button class="btn right" id="addProd">+ New production</button></div>' +

    listHtml + '</div>' + prodView;

  el('addProd').onclick = function () {
    if (!isPro && activeProductions().length >= FREE_PROD_LIMIT) {
      upgradeModal('The free plan runs ' + FREE_PROD_LIMIT + ' production at a time.');
      return;
    }
    var box = openModal(
      '<h2>New production</h2>' +
      '<div class="row"><div class="field"><label class="f">Name *</label><input id="npName" placeholder="Our Town"></div></div>' +
      '<div class="row"><div class="field small"><label class="f">Opens</label><input id="npOpen" type="date"></div>' +

    return '<button class="btn small ' + (p.status === s ? 'gold' : 'ghost') + '" data-status="' + s + '">' + s + '</button>';
  }).join(' ');

  return '<div class="panel">' +
    '<div class="row"><h2 style="margin:0">' + esc(p.name) + '</h2><span class="muted">' + esc(p.opens || '') + (p.closes ? ' to ' + esc(p.closes) : '') + '</span>' +
    '<span class="right"></span>' + statusBtns + '</div>' +
    '<h3>Pull list (' + rows.length + ' pieces)</h3>' +
    '<div class="row"><input id="plSearch" class="grow" placeholder="Type to find a piece to add: gown, DR-0012, top hat..."><div id="plResults"></div></div>' +
    '<div id="plMatches"></div>' +
    (rows.length ? '<div class="table-scroll" style="margin-top:10px"><table class="grid"><tr>' +
      '<th>Tag</th><th>Item</th><th>Character</th><th>Actor</th><th>Scene</th><th>Status</th><th></th></tr>' +

        var item = state.items.find(function (i) { return i.id === a.itemId; });
        return '<tr><td><b>' + esc(item ? item.tagId : '?') + '</b></td><td>' + esc(item ? item.name : '(deleted)') + '</td>' +
          '<td><input data-af="character" data-aid="' + a.id + '" value="' + esc(a.character) + '" style="min-width:90px"></td>' +
          '<td><input data-af="actor" data-aid="' + a.id + '" value="' + esc(a.actor) + '" style="min-width:90px"></td>' +
          '<td><input data-af="scene" data-aid="' + a.id + '" value="' + esc(a.scene) + '" style="width:60px"></td>' +
          '<td><button class="btn small ghost" data-cycle="' + a.id + '">' + a.status + '</button></td>' +
          '<td><button class="btn small danger" data-unassign="' + a.id + '">&times;</button></td></tr>';
      }).join('') + '</table></div>' : '<p class="muted">Nothing on the pull list yet.</p>') +
    '<div class="row" style="margin-top:12px">' +
    (isPro
      ? '<button class="btn" id="printPull">Print pull sheet (by rack)</button>' +
        '<button class="btn" id="printPlot">Print costume plot</button>' +
        '<button class="btn ghost" id="printStrike">Strike report</button>'
      : '<div class="locked" style="flex:1"><b>Pro print pack:</b> pull sheet grouped by rack for pull day, per-character costume plot, ' +
        'and the strike report that lists every unreturned piece with dollar values (' + rec.missing.length + ' unreturned right now, ' +
        fmtMoney(rec.missingValueCents) + ' at risk). <a href="#" id="lockUp">Unlock with Pro</a>.</div>') +
    '</div></div>';
}

function wireProductionView(pane) {
  var p = state.productions.find(function (x) { return x.id === currentProdId; });
  if (!p) return;
  pane.querySelectorAll('[data-status]').forEach(function (b) {
    b.onclick = function () { setProductionStatus(state, p.id, b.getAttribute('data-status')); save(); };
  });
  var search = pane.querySelector('#plSearch');
  var matches = pane.querySelector('#plMatches');
  if (search) search.oninput = function () {
    var q = search.value.trim();
    if (!q) { matches.innerHTML = ''; return; }
    var found = searchItems(state, { q: q }).slice(0, 6);
    matches.innerHTML = found.map(function (i) {
      var already = assignmentsFor(state, p.id).some(function (a) { return a.itemId === i.id; });
      return '<button class="btn small ghost" style="margin:4px 4px 0 0"' + (already ? ' disabled' : '') +
        ' data-add="' + i.id + '">' + esc(i.tagId) + ' ' + esc(i.name) + (already ? ' (on list)' : '') + '</button>';
    }).join('') || '<span class="muted">No match.</span>';
    matches.querySelectorAll('[data-add]').forEach(function (b) {
      b.onclick = function () {
        assignItem(state, p.id, b.getAttribute('data-add'), {});
        save();
      };
    });
  };
  pane.querySelectorAll('[data-af]').forEach(function (inp) {
    inp.onchange = function () {
      var a = state.assignments.find(function (x) { return x.id === inp.getAttribute('data-aid'); });
      if (a) { a[inp.getAttribute('data-af')] = inp.value.trim(); localStorage.setItem(LS_STATE, serializeVault(state)); }
    };
  });
  pane.querySelectorAll('[data-cycle]').forEach(function (b) {
    b.onclick = function () {
      var a = state.assignments.find(function (x) { return x.id === b.getAttribute('data-cycle'); });
      var order = ['planned', 'pulled', 'fitted', 'returned'];
      setAssignmentStatus(state, a.id, order[(order.indexOf(a.status) + 1) % order.length]);
      save();
    };
  });
  pane.querySelectorAll('[data-unassign]').forEach(function (b) {
    b.onclick = function () { unassignItem(state, b.getAttribute('data-unassign')); save(); };
  });
  var pp = pane.querySelector('#printPull'); if (pp) pp.onclick = function () { printPull(p); };
  var pl = pane.querySelector('#printPlot'); if (pl) pl.onclick = function () { printPlot(p); };
  var st = pane.querySelector('#printStrike'); if (st) st.onclick = function () { printStrike(p); };
  var lk = pane.querySelector('#lockUp'); if (lk) lk.onclick = function (e) { e.preventDefault(); upgradeModal('The print pack and strike report are Pro features.'); };
}

    '<div class="panel"><h2>Backup and handover</h2>' +
    '<p class="muted">The vault file is the whole closet: items, photos, checkouts, productions, history. ' +
    'Export it before switching computers, and hand it to the next wardrobe manager when you pass the torch.</p>' +
    '<div class="row" style="margin-top:8px">' +
    '<button class="btn" id="vaultOut">Export vault (with photos)</button>' +
    '<label class="btn ghost" style="cursor:pointer">Restore vault<input type="file" id="vaultIn" accept=".stagecloset,.json" style="display:none"></label>' +
    '<button class="btn ghost" id="csvOut">Export CSV</button>' +
    '</div></div>' +

    '<div class="panel"><h2>License</h2>' +
    (isPro
      ? '<p>Pro is active on this browser. Thank you for keeping the curtain up.</p>'
      : '<p class="muted">Free plan: ' + FREE_ITEM_LIMIT + ' items, ' + FREE_PROD_LIMIT + ' active production. Pro is a one-time key, no account, works offline.</p>' +
        '<div class="row"><button class="btn gold" id="goPro">See what Pro adds</button></div>') +
    '</div>' +

    '<div class="panel"><h2>Danger zone</h2><div class="row">' +
    '<button class="btn ghost" id="demoBtn2">Load sample closet</button>' +
    '<button class="btn danger" id="wipeBtn">Erase everything</button></div></div>';

  el('csvGo').onclick = function () { doImport(el('csvIn').value); };
  el('csvFile').onchange = function (e) {
    var f = e.target.files[0];
    if (!f) return;
    var fr = new FileReader();
    fr.onload = function () { doImport(String(fr.result)); };
    fr.readAsText(f);
  };
  el('vaultOut').onclick = exportVaultWithPhotos;
  el('vaultIn').onchange = function (e) {
    var f = e.target.files[0];
    if (!f) return;
    var fr = new FileReader();
    fr.onload = function () {
      var res = parseVault(String(fr.result));
      if (!res.ok) { alert(res.errors.join(' ')); return; }
      if (!confirm('Replace the current closet (' + state.items.length + ' items) with this vault (' + res.state.items.length + ' items)?')) return;
      state = res.state;
      var photos = res.photos || {};
      var chain = Promise.resolve();
      Object.keys(photos).forEach(function (pid) {
        chain = chain.then(function () {
          return fetch(photos[pid]).then(function (r) { return r.blob(); }).then(function (b) { return photoPut(pid, b); });
        });
      });
      chain.then(function () { urlCache.clear(); save(); });
    };
    fr.readAsText(f);
  };
  el('csvOut').onclick = function () { download('stagecloset-inventory.csv', exportCSV(state), 'text/csv'); };
  var gp = el('goPro'); if (gp) gp.onclick = function () { upgradeModal('Unlock the whole closet.'); };
  el('demoBtn2').onclick = loadSample;
  el('wipeBtn').onclick = function () {
    if (!confirm('Erase ALL items, history, productions, and photos from this browser?')) return;
    if (!confirm('Last chance. This cannot be undone unless you exported a vault.')) return;
    state.items.forEach(function (i) { i.photoIds.forEach(photoDel); });
    state = emptyState();
    urlCache.clear();
    save();
  };
}

function doImport(text) {
  var rows = parseCSV(text);
  if (!rows.length) { el('csvMsg').textContent = 'Nothing to import.'; return; }
  var before = state.items.length;
  var res = importRows(state, rows);
  if (!res.ok) { el('csvMsg').textContent = res.errors.join(' '); return; }
  if (!isPro && state.items.length > FREE_ITEM_LIMIT) {
    var over = state.items.length - FREE_ITEM_LIMIT;
    state.items.splice(FREE_ITEM_LIMIT);
    save();
    upgradeModal('Your spreadsheet has more pieces than the free plan holds. Imported the first ' +
      (FREE_ITEM_LIMIT - before) + ', left ' + over + ' behind. Pro imports everything.');
    return;
  }
  save();
  el('csvMsg').textContent = 'Imported ' + res.imported + ' items' + (res.skipped ? ', skipped ' + res.skipped : '') + '.';
}

function exportVaultWithPhotos() {
  var ids = [];
  state.items.forEach(function (i) { ids = ids.concat(i.photoIds); });
  var photos = {};
  var chain = Promise.resolve();
  ids.forEach(function (pid) {
    chain = chain.then(function () {
      return photoGet(pid).then(function (blob) {
        if (!blob) return;
        return new Promise(function (res) {
          var fr = new FileReader();
          fr.onload = function () { photos[pid] = fr.result; res(); };
          fr.readAsDataURL(blob);
        });
      });
    });
  });
  chain.then(function () {
    download('closet-' + todayISO() + '.stagecloset', serializeVault(state, { photos: photos }), 'application/json');
  });
}

function nDaysOut(n) {
  var d = new Date(Date.now() + n * 86400000);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// ---------- chrome ----------
function renderChrome() {
  el('cntItems').textContent = state.items.length ? '(' + state.items.length + ')' : '';
  var out = openCheckouts(state).length;
  el('cntOut').textContent = out ? '(' + out + ')' : '';
  el('cntProds').textContent = state.productions.length ? '(' + state.productions.length + ')' : '';
  var badge = el('proBadge');
  badge.textContent = isPro ? 'Pro' : 'Free plan';
  badge.classList.toggle('active', isPro);
  badge.onclick = function () { upgradeModal(isPro ? 'Pro is active.' : 'Unlock the whole closet.'); };

    (isPro ? 'Pro' : 'free plan ' + state.items.length + '/' + FREE_ITEM_LIMIT);
}

function renderAll() {
  renderChrome(); renderCloset(); renderCheckout(); renderProductions(); renderDashboard(); renderVault();
}

document.querySelectorAll('nav.tabs button').forEach(function (b) {
